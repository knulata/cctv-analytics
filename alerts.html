<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alerts — CCTV Analytics</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
<div class="app">
    <aside class="sidebar">
        <div class="sidebar-brand">
            <h1><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg> CCTV Analytics</h1>
            <p>Security & Service Monitor</p>
        </div>
        <nav class="sidebar-nav">
            <a href="/" class="nav-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="9" rx="1"/><rect x="14" y="3" width="7" height="5" rx="1"/><rect x="14" y="12" width="7" height="9" rx="1"/><rect x="3" y="16" width="7" height="5" rx="1"/></svg> Dashboard</a>
            <a href="/cameras" class="nav-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg> Cameras</a>
            <a href="/alerts" class="nav-item active"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg> Alerts <span class="nav-badge" id="alert-badge" style="display:none">0</span></a>
            <a href="/reports" class="nav-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21.21 15.89A10 10 0 1 1 8 2.83"/><path d="M22 12A10 10 0 0 0 12 2v10z"/></svg> Reports</a>
        </nav>
        <div class="sidebar-footer"><div class="wa-status"><span class="wa-dot off" id="wa-dot"></span><span id="wa-label">WA: Checking...</span></div></div>
    </aside>

    <div class="content">
        <div class="page-header">
            <div>
                <h1 class="page-title">Alerts</h1>
                <p class="page-subtitle">Security and service notifications</p>
            </div>
        </div>

        <div class="filters">
            <select class="form-select" id="f-sev" onchange="load()">
                <option value="">All Severities</option>
                <option value="critical">Critical</option>
                <option value="high">High</option>
                <option value="medium">Medium</option>
                <option value="low">Low</option>
            </select>
            <select class="form-select" id="f-cat" onchange="load()">
                <option value="">All Categories</option>
                <option value="theft">Theft</option>
                <option value="fraud">Fraud</option>
                <option value="service">Service</option>
                <option value="system">System</option>
            </select>
            <label><input type="checkbox" id="f-unread" onchange="load()"> Unread only</label>
        </div>

        <div class="card">
            <div id="alert-list">
                <div class="card-body">
                    <div class="empty">
                        <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
                        <h3>All clear</h3>
                        <p>No alerts to show</p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<nav class="mobile-nav">
    <a href="/"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="9" rx="1"/><rect x="14" y="3" width="7" height="5" rx="1"/><rect x="14" y="12" width="7" height="9" rx="1"/><rect x="3" y="16" width="7" height="5" rx="1"/></svg> Dashboard</a>
    <a href="/cameras"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg> Cameras</a>
    <a href="/alerts" class="active"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/></svg> Alerts</a>
    <a href="/reports"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21.21 15.89A10 10 0 1 1 8 2.83"/><path d="M22 12A10 10 0 0 0 12 2v10z"/></svg> Reports</a>
</nav>

<script src="/js/app.js"></script>
<script>
async function markRead(id) {
    await fetch(`/api/alerts/${id}/read`, { method: 'PUT' });
    load();
}

async function load() {
    const p = new URLSearchParams();
    const sev = document.getElementById('f-sev').value;
    const cat = document.getElementById('f-cat').value;
    const unread = document.getElementById('f-unread').checked;
    if (sev) p.set('severity', sev);
    if (cat) p.set('category', cat);
    if (unread) p.set('unread', 'true');

    const r = await fetch('/api/alerts?' + p);
    const alerts = await r.json();
    const el = document.getElementById('alert-list');
    if (!alerts.length) {
        el.innerHTML = '<div class="card-body"><div class="empty"><svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg><h3>All clear</h3><p>No alerts match your filters</p></div></div>';
        return;
    }
    el.innerHTML = '<div class="alert-list">' + alerts.map(a => `
        <div class="alert-item ${a.is_read ? '' : 'unread'}" onclick="markRead('${a.id}')">
            <div class="alert-dot ${a.severity}"></div>
            <div class="alert-body">
                <div class="alert-title">${a.title}</div>
                <div class="alert-desc">${a.description || ''}</div>
                <div class="alert-meta">
                    <span class="badge badge-${a.severity}">${a.severity}</span>
                    <span class="badge badge-${a.business_type}">${a.business_type}</span>
                    <span>${a.camera_name}</span>
                    <span>${a.category}</span>
                    <span>${timeAgo(a.created_at)}</span>
                </div>
            </div>
        </div>
    `).join('') + '</div>';
}

load();
setInterval(load, 15000);
</script>
</body>
</html>
